<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Officer AI Agent</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #1a4f8f;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #1a4f8f;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #133a6f;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #dee2e6;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
        }
        .checkbox-group input {
            margin-right: 8px;
        }
        .progress-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 20px;
            background-color: #1a4f8f;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 12px;
            transition: width 0.3s ease;
        }
        .progress-text {
            text-align: center;
            margin-top: 5px;
            font-size: 14px;
            font-weight: bold;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .processing { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; text-align: center; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a4f8f;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a.download-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ Privacy Officer AI Agent</h1>
        <p>Offline, zero-leak text anonymization interface.</p>
    </div>

    <div class="card">
        <form id="uploadForm">
            <div class="form-group">
                <label for="csvFile">1. Upload Raw Data (CSV)</label>
                <input type="file" id="csvFile" name="file" accept=".csv" required>
            </div>
            
            <div class="form-group">
                <label for="columnName">2. Column to Anonymize</label>
                <input type="text" id="columnName" name="text_column" value="feedback_text" required>
            </div>

            <div class="form-group">
                <label>3. Entity Types to Anonymize</label>
                <div class="settings-grid">
                    <div class="checkbox-group">
                        <input type="checkbox" id="anon_names" name="anon_names" checked>
                        <label for="anon_names" style="margin:0; font-weight:normal;">Personal Names [NAME]</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="anon_locations" name="anon_locations" checked>
                        <label for="anon_locations" style="margin:0; font-weight:normal;">Locations [LOCATION]</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="anon_pii" name="anon_pii" checked>
                        <label for="anon_pii" style="margin:0; font-weight:normal;">Emails/Phones [PII]</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="anon_titles" name="anon_titles" checked>
                        <label for="anon_titles" style="margin:0; font-weight:normal;">Roles & Titles [TITLE]</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="anon_physical" name="anon_physical" checked>
                        <label for="anon_physical" style="margin:0; font-weight:normal;">Physical Details [PHYSICAL]</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="anon_courses" name="anon_courses" checked>
                        <label for="anon_courses" style="margin:0; font-weight:normal;">Courses/Depts [COURSE]</label>
                    </div>
                    <div class="checkbox-group" style="grid-column: span 2;">
                        <input type="checkbox" id="anon_student_nr" name="anon_student_nr" checked>
                        <label for="anon_student_nr" style="margin:0; font-weight:normal;">Student Numbers (e.g. 547795) [PII]</label>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Start Local Anonymization</button>
        </form>

        <div id="status"></div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>
        <div class="progress-text" id="progressText"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = document.getElementById('uploadForm');
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('csvFile').files[0];
            const columnName = document.getElementById('columnName').value;
            
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            if(!fileInput) return;

            // Update UI to Processing state
            statusDiv.className = 'status processing';
            statusDiv.innerHTML = '<div class="spinner"></div><p>Processing with strictly local offline models. This may take a moment depending on file size...</p>';
            statusDiv.style.display = 'block';
            
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            progressText.textContent = 'Starting...';
            
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput);
            formData.append('text_column', columnName);
            formData.append('anon_names', document.getElementById('anon_names').checked);
            formData.append('anon_locations', document.getElementById('anon_locations').checked);
            formData.append('anon_pii', document.getElementById('anon_pii').checked);
            formData.append('anon_titles', document.getElementById('anon_titles').checked);
            formData.append('anon_physical', document.getElementById('anon_physical').checked);
            formData.append('anon_courses', document.getElementById('anon_courses').checked);
            formData.append('anon_student_nr', document.getElementById('anon_student_nr').checked);

            // Connect to Server-Sent Events for progress
            const eventSource = new EventSource('/api/progress');
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                progressBar.style.width = data.percentage + '%';
                progressBar.textContent = data.percentage + '%';
                progressText.textContent = data.status;
                
                if (data.percentage >= 100) {
                    eventSource.close();
                }
            };

            try {
                const response = await fetch('/api/anonymize', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if(response.ok) {
                    let warningHtml = "";
                    if (result.flagged_count > 0) {
                        warningHtml = `<div style="margin-top: 15px; padding: 10px; background-color: #fff3cd; color: #856404; border-radius: 5px; border: 1px solid #ffeeba;">
                            <strong>⚠️ Let op:</strong> ${result.flagged_count} item(s) zijn gemarkeerd voor menselijke controle (bijv. doordat de AI weigerde). 
                            Deze beginnen met <code>[NEEDS_REVIEW_...]</code> in de gedownloade CSV.
                        </div>`;
                    }

                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        <strong>✅ Dataset successfully anonymized!</strong><br>
                        Local Ollama parsing complete.
                        <br><br>
                        <a href="${result.download_url}" class="download-btn" download>📥 Download Anonymized CSV</a>
                        ${warningHtml}
                    `;
                    progressText.textContent = 'Process finished successfully!';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = `<strong>❌ Error:</strong> ${result.detail || result.error || 'Pipeline failed to process file.'}`;
                    eventSource.close();
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `<strong>❌ Connection Error:</strong> Ensure the FastAPI server is running. (${error.message})`;
                eventSource.close();
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
